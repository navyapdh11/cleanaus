name: 📊 Observability & Monitoring

on:
  push:
    branches: [main]
  schedule:
    # Run monitoring checks every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ============================================
  # Performance Monitoring
  # ============================================
  performance-check:
    name: ⚡ Performance Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build applications
        run: pnpm run build

      - name: Lighthouse CI - Performance Audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          budgetPath: ./apps/web/lighthouse-budget.json
          runs: 3
          temporaryPublicStorage: true
        continue-on-error: true

      - name: Bundle size check
        run: |
          cd apps/web
          echo "=== Bundle Sizes ==="
          find .next/static/chunks -name "*.js" -exec du -h {} \; 2>/dev/null | sort -rh | head -20
          echo ""
          echo "=== Total .next Size ==="
          du -sh .next/ 2>/dev/null

      - name: API response time check
        run: |
          echo "Note: API not running in CI, skipping response time check"
          # In production, this would hit the actual API endpoints
          # curl -w "@curl-format.txt" -o /dev/null -s https://api.cleanaus.com.au/health

  # ============================================
  # Dependency Updates Check
  # ============================================
  dependency-check:
    name: 📦 Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Check for outdated dependencies
        run: |
          pnpm outdated || true

      - name: Security audit
        run: |
          pnpm audit --audit-level=high || true

      - name: Generate dependency report
        run: |
          echo "## 📦 Dependency Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### API Dependencies" >> $GITHUB_STEP_SUMMARY
          cd services/api
          pnpm list --depth=0 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Web Dependencies" >> $GITHUB_STEP_SUMMARY
          cd ../../apps/web
          pnpm list --depth=0 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY

  # ============================================
  # OpenTelemetry Validation
  # ============================================
  otel-validation:
    name: 🔍 OpenTelemetry Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '8.15.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate OpenTelemetry configuration
        run: |
          echo "=== Checking OpenTelemetry Service ==="
          if [ -f "services/api/src/common/services/opentelemetry.service.ts" ]; then
            echo "✅ OpenTelemetry service file exists"
            grep -c "trace" services/api/src/common/services/opentelemetry.service.ts
            grep -c "span" services/api/src/common/services/opentelemetry.service.ts
          fi

      - name: Validate OTel config
        run: |
          echo "=== Docker OTel Config ==="
          if [ -f "docker/otel/otel-config.yaml" ]; then
            echo "✅ OTel collector config exists"
            cat docker/otel/otel-config.yaml
          fi

      - name: Check environment variables
        run: |
          echo "=== OTEL Environment Variables ==="
          grep "OTEL_" .env.example || echo "No OTEL vars in .env.example"

  # ============================================
  # Health Checks Summary
  # ============================================
  health-summary:
    name: 📈 Health Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [performance-check, dependency-check, otel-validation]

    steps:
      - name: Generate monitoring summary
        run: |
          echo "## 📊 CleanAUS Monitoring Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ✅ Audited |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenTelemetry | ✅ Validated |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Review performance metrics in [Vercel Analytics](https://vercel.com/cleanaus/cleanaus/analytics)" >> $GITHUB_STEP_SUMMARY
          echo "- Check dependency updates and apply security patches" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor production metrics in Grafana dashboard" >> $GITHUB_STEP_SUMMARY
