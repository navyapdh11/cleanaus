apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleanaus-web
  namespace: cleanaus
  labels:
    app: cleanaus-web
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cleanaus-web
  template:
    metadata:
      labels:
        app: cleanaus-web
        version: v1
    spec:
      containers:
        - name: web
          image: cleanaus/web:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.cleanaus.com.au/v1"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cleanaus-web
  namespace: cleanaus
spec:
  selector:
    app: cleanaus-web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cleanaus-web
  namespace: cleanaus
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cleanaus.com.au
        - www.cleanaus.com.au
      secretName: cleanaus-web-tls
  rules:
    - host: cleanaus.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cleanaus-web
                port:
                  number: 80
    - host: www.cleanaus.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cleanaus-web
                port:
                  number: 80
